<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Contact Rane's Creamberg for enquiries, bulk orders, and support."
    />
    <title>Contact Us | Rane's Creamberg</title>
    
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css" rel="stylesheet" />
    <link rel="stylesheet" href="contact.css" />
    <link rel="stylesheet" href="navbar.css" />
    <link rel="stylesheet" href="footer.css" />
  </head>
  <body>
    
    <div id="navbar-placeholder"></div>

    <header class="contact__header">
      <div class="section__container">
        <h2 class="section__header">Get In Touch</h2>
        <p class="section__description">
          Have a sweet question or a bulk order? We are here to help!
        </p>
      </div>
    </header>

    <section class="section__container contact__container">
      <div class="contact__grid">
        
        <div class="contact__content form__box">
          <h3>Send us a Message</h3>
          <form id="contact-form">
            <input type="hidden" name="access_key" value="80d2768b-5d30-4359-9a58-d81b20d401bb" />
            <input type="hidden" name="subject" value="New Contact Form Submission - Rane's Creamberg" />
            <input type="checkbox" name="botcheck" class="hidden" style="display: none;" />
            <div class="input__group">
              <input type="text" name="name" placeholder="Your Name" required />
            </div>
            <div class="input__group">
              <input type="email" name="email" placeholder="Your Email" required />
            </div>
            <div class="input__group">
              <input type="text" name="topic" placeholder="Subject" />
            </div>
            <div class="input__group">
              <textarea name="message" placeholder="Your Message" rows="5" required></textarea>
            </div>
            <button type="submit" class="btn">Send Message</button>
            <p id="contact-form-message" aria-live="polite" style="display: none; margin-top: 1rem; font-weight: 600;"></p>
          </form>
        </div>

        <div class="contact__content info__box">
          <h3>Contact Information</h3>
          <div class="info__details">
            <div class="info__item">
              <div class="icon__box"><i class="ri-map-pin-fill"></i></div>
              <div>
                <h4>Location</h4>
                <p>123 Ice Cream Lane, Sweet City, 400001</p>
              </div>
            </div>
            
            <div class="info__item">
              <div class="icon__box"><i class="ri-phone-fill"></i></div>
              <div>
                <h4>Phone</h4>
                <p>+91 98765 43210</p>
              </div>
            </div>

            <div class="info__item">
              <div class="icon__box"><i class="ri-mail-open-fill"></i></div>
              <div>
                <h4>Email</h4>
                <p>hello@ranescreamberg.com</p>
              </div>
            </div>
          </div>

          <div class="contact__socials">
             <h4>Follow Us</h4>
             <ul class="socials">
                <li><a href="https://www.facebook.com" target="_blank" rel="noopener noreferrer" aria-label="Visit Facebook"><i class="ri-facebook-fill"></i></a></li>
                <li><a href="https://www.instagram.com" target="_blank" rel="noopener noreferrer" aria-label="Visit Instagram"><i class="ri-instagram-line"></i></a></li>
             </ul>
          </div>
        </div>
      </div>
    </section>

    <div id="footer-placeholder"></div>

    <script src="main.js"></script>
  </body>
</html>
